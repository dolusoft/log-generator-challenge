# Copy this file to docker-compose.yml and fill in the generator and frontend
# build contexts with your own implementation. The receiver service is
# preconfigured and must NOT be modified.
#
# After completion, `docker compose up` from the repo root must bring up all
# three services and reach a ready state within 60 seconds.

services:
  receiver:
    image: ghcr.io/dolusoft/syslog-sink:0.5.0@sha256:3d34117e0bbc783108bafb727662c1cda887b1035a0bbc2f0042573e82012a27
    container_name: receiver
    ports:
      - "4000:4000"
    networks:
      - challenge
    # The receiver reads the generator container's CPU from Docker stats to
    # compute the EPS/core metric, so it needs the Docker socket + the name of
    # the container to watch.
    #
    # SECURITY — read before using: bind-mounting the Docker socket grants the
    # receiver effectively host-root. `:ro` only blocks writes to the socket
    # *file*; it does NOT restrict the Docker API reachable through it, so treat
    # the receiver as a privileged container. Controls in place / required:
    #   1. The `image:` line above is pinned to an immutable digest, so only the
    #      verified reference image can ever hold the socket. Keep it pinned and
    #      never point this mount at any other image.
    #   2. Run untrusted submissions in a disposable VM / throwaway sandbox,
    #      never on a workstation with anything valuable.
    #   3. For least privilege you can still front the socket with a read-only
    #      Docker socket proxy that exposes only the stats endpoint — see
    #      receiver/README.md "Security: Docker socket access".
    environment:
      - SYSLOG_SINK_TARGET_CONTAINER=generator
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  generator:
    # TODO: replace with your build context, e.g.:
    #   build:
    #     context: ./generator
    #     dockerfile: Dockerfile
    image: your-org/log-generator:dev
    container_name: generator
    ports:
      - "3000:3000"
    networks:
      - challenge
    depends_on:
      - receiver
    environment:
      - RECEIVER_HOST=receiver
      - RECEIVER_UDP_PORT=514
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped

  frontend:
    # TODO: replace with your build context, e.g.:
    #   build:
    #     context: ./frontend
    #     dockerfile: Dockerfile
    image: your-org/log-frontend:dev
    container_name: frontend
    ports:
      - "5173:5173"
    networks:
      - challenge
    depends_on:
      - generator
      - receiver
    environment:
      - GENERATOR_URL=http://generator:3000
      - RECEIVER_URL=http://receiver:4000
    restart: unless-stopped

networks:
  challenge:
    driver: bridge
